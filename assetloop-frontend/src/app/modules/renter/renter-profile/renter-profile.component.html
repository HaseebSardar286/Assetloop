<div class="d-flex flex-column vh-100">
  <app-header (logout)="onLogout()"></app-header>

  <!-- Main Content -->
  <div class="d-flex flex-grow-1">
    <app-renter-side-bar></app-renter-side-bar>
    <main class="flex-grow-1 p-4 bg-light">
      <h2 class="mb-4">My Profile</h2>
      <div class="row">
        <div class="col-md-4">
          <div class="card text-center p-3 mb-4">
            <div
              class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center"
              style="width: 100px; height: 100px; margin: 0 auto"
            >
              <h2 class="m-0">
                {{ profile.firstName.charAt(0)
                }}{{ profile.lastName.charAt(0) }}
              </h2>
            </div>
            <h5 class="mt-3">{{ profile.firstName }} {{ profile.lastName }}</h5>
            <p class="text-muted">{{ profile.email }}</p>
            <button class="btn btn-primary w-100">Log Out</button>
          </div>
          <div class="card p-3">
            <h6>Account Status</h6>
            <p>
              <strong>Member Since:</strong> {{ accountStatus.memberSince }}
            </p>
            <p><strong>Bookings:</strong> {{ accountStatus.bookings }}</p>
            <p><strong>Reviews:</strong> {{ accountStatus.reviews }}</p>
          </div>
        </div>
        <div class="col-md-8">
          <div class="card p-4">
            <ul
              class="nav nav-tabs mb-2 gap-1 bg-dark p-2 rounded"
              id="myTab"
              role="tablist"
            >
              <li class="nav-item" role="presentation">
                <button
                  class="nav-link active"
                  id="profile-tab"
                  data-bs-toggle="tab"
                  data-bs-target="#profile"
                  type="button"
                  role="tab"
                  aria-controls="profile"
                  aria-selected="true"
                >
                  Profile Information
                </button>
              </li>
              <li class="nav-item" role="presentation">
                <button
                  class="nav-link"
                  id="change-password-tab"
                  data-bs-toggle="tab"
                  data-bs-target="#change-password"
                  type="button"
                  role="tab"
                  aria-controls="change-password"
                  aria-selected="false"
                >
                  Change Password
                </button>
              </li>
              <li class="nav-item" role="presentation">
                <button
                  class="nav-link"
                  id="notification-settings-tab"
                  data-bs-toggle="tab"
                  data-bs-target="#notification-settings"
                  type="button"
                  role="tab"
                  aria-controls="notification-settings"
                  aria-selected="false"
                >
                  Notification Settings
                </button>
              </li>
            </ul>
            <div class="tab-content" id="myTabContent">
              <div
                class="tab-pane fade show active"
                id="profile"
                role="tabpanel"
                aria-labelledby="profile-tab"
              >
                <form>
                  <div class="mb-3">
                    <div class="col">
                      <label>First Name</label>
                      <input
                        type="text"
                        class="form-control"
                        [(ngModel)]="profile.firstName"
                        name="firstName"
                      />
                    </div>
                  </div>
                  <div class="mb-3">
                    <div class="col">
                      <label>Last Name</label>
                      <input
                        type="text"
                        class="form-control"
                        [(ngModel)]="profile.lastName"
                        name="lastName"
                      />
                    </div>
                  </div>
                  <div class="mb-3">
                    <label>Email</label>
                    <input
                      type="email"
                      class="form-control"
                      [(ngModel)]="profile.email"
                      name="email"
                      readonly
                    />
                  </div>
                  <div class="mb-3">
                    <label>Phone Number</label>
                    <input
                      type="tel"
                      class="form-control"
                      [(ngModel)]="profile.phoneNumber"
                      name="phoneNumber"
                    />
                  </div>
                  <div class="mb-3">
                    <label>Bio</label>
                    <textarea
                      class="form-control"
                      [(ngModel)]="profile.bio"
                      name="bio"
                      rows="3"
                    ></textarea>
                  </div>
                  <button
                    type="button"
                    class="btn btn-primary w-100"
                    (click)="onSaveChanges()"
                  >
                    Save Changes
                  </button>
                </form>
              </div>
              <div
                class="tab-pane fade"
                id="change-password"
                role="tabpanel"
                aria-labelledby="change-password-tab"
              >
                <!-- Add change password form here -->
              </div>
              <div
                class="tab-pane fade"
                id="notification-settings"
                role="tabpanel"
                aria-labelledby="notification-settings-tab"
              >
                <!-- Add notification settings form here -->
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
