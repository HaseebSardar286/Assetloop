<div class="container-fluid p-0">
  <header
    class="bg-light p-3 d-flex justify-content-between align-items-center"
  >
    <a class="navbar-brand text-black logo">AssetLoop</a>
    <form class="d-flex w-100 px-5" [formGroup]="searchForm">
      <input
        class="form-control me-2 rounded-5"
        type="search"
        formControlName="keywords"
        placeholder="Search listings..."
      />
      <button
        class="btn btn-outline-success rounded-5"
        type="button"
        (click)="applySearch()"
      >
        <fa-icon [icon]="faSearch"></fa-icon>
      </button>
    </form>
    <div class="d-flex gap-2 px-2">
      <button type="button" class="btn btn-primary rounded-5">
        <fa-icon [icon]="faBell"></fa-icon>
      </button>
      <button type="button" class="btn btn-danger rounded-5">
        <fa-icon [icon]="faHeart"></fa-icon>
      </button>
    </div>
    <div class="px-1" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item dropdown">
          <a
            class="nav-link text-black"
            id="userDropdown"
            role="button"
            data-bs-toggle="dropdown"
            aria-expanded="false"
          >
            <button type="button" class="btn btn-dark rounded-5">
              <fa-icon [icon]="faUser"></fa-icon>
            </button>
          </a>
          <ul
            class="dropdown-menu dropdown-menu-end"
            aria-labelledby="userDropdown"
          >
            <li><a class="dropdown-item">Help/Support</a></li>
            <li>
              <a class="dropdown-item" (click)="logout.emit()">Logout</a>
            </li>
          </ul>
        </li>
      </ul>
    </div>
  </header>

  <div class="filters p-3 bg-light d-flex gap-2">
    <select class="form-select" [(ngModel)]="category">
      <option value="">Category</option>
      <option value="apartment">Apartment</option>
      <option value="house">House</option>
    </select>
    <input
      type="text"
      class="form-control"
      placeholder="Location"
      [(ngModel)]="location"
    />
    <input
      type="text"
      class="form-control"
      placeholder="Dates"
      [(ngModel)]="dates"
    />
    <input
      type="text"
      class="form-control"
      placeholder="Min"
      [(ngModel)]="minPrice"
    />
    <select class="form-select" [(ngModel)]="sort">
      <option value="">Sort</option>
      <option value="price-asc">Price: Low to High</option>
      <option value="price-desc">Price: High to Low</option>
    </select>
  </div>

  <div class="p-4">
    <div class="row g-3">
      <div class="col-md-3" *ngFor="let asset of paginatedAssets">
        <app-product-item
          [booking]="asset"
          (viewListing)="onBookNow($event)"
          (addToCart)="onBookNow($event)"
          (removeFavourite)="removeFavourite($event)"
          (share)="share($event)"
          (updateNotes)="updateNotes($event)"
        ></app-product-item>
      </div>
    </div>
  </div>

  <div class="d-flex justify-content-center align-items-center gap-2 p-3">
    <button
      class="btn btn-outline-secondary"
      [disabled]="currentPage === 1"
      (click)="setPage(currentPage - 1)"
    >
      &lt;
    </button>
    <span *ngFor="let page of [1, 2, 3]">
      <button
        class="btn btn-outline-secondary"
        [class.active]="currentPage === page"
        (click)="setPage(page)"
      >
        {{ page }}
      </button>
    </span>
    <button
      class="btn btn-outline-secondary"
      [disabled]="currentPage === 3"
      (click)="setPage(currentPage + 1)"
    >
      &gt;
    </button>
  </div>
</div>
